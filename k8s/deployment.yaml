# Production frontend deployment for the Next.js app. The image should be built
# with docker/Dockerfile.frontend from the repository root.
apiVersion: apps/v1
kind: Deployment
metadata:
    name: trustledger-frontend
    namespace: trustledger
    labels:
        app.kubernetes.io/name: trustledger-frontend
        app.kubernetes.io/part-of: trustledger
spec:
    replicas: 2
    revisionHistoryLimit: 3
    selector:
        matchLabels:
            app.kubernetes.io/name: trustledger-frontend
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1
    template:
        metadata:
            labels:
                app.kubernetes.io/name: trustledger-frontend
                app.kubernetes.io/part-of: trustledger
        spec:
            automountServiceAccountToken: false
            securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: frontend
                  image: ghcr.io/kevinle3212/trustledger-frontend:main
                  imagePullPolicy: IfNotPresent
                  ports:
                      - name: http
                        containerPort: 3000
                  env:
                      - name: NODE_ENV
                        value: production
                      - name: PORT
                        value: "3000"
                      - name: HOSTNAME
                        value: 0.0.0.0
                  envFrom:
                      - configMapRef:
                            name: trustledger-frontend-config
                      - secretRef:
                            name: trustledger-frontend-secrets
                            optional: true
                  readinessProbe:
                      httpGet:
                          path: /api/health/runtime
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
                  livenessProbe:
                      httpGet:
                          path: /api/health/runtime
                          port: http
                      initialDelaySeconds: 30
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3
                  startupProbe:
                      httpGet:
                          path: /api/health/runtime
                          port: http
                      periodSeconds: 5
                      failureThreshold: 24
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          cpu: 1000m
                          memory: 768Mi
                  securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: false
                      capabilities:
                          drop:
                              - ALL
