apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: trustledger-frontend
    namespace: trustledger
    labels:
        app.kubernetes.io/name: trustledger-frontend
        app.kubernetes.io/part-of: trustledger
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: trustledger-frontend
    minReplicas: 2
    maxReplicas: 6
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: 70
        - type: Resource
          resource:
              name: memory
              target:
                  type: Utilization
                  averageUtilization: 80
