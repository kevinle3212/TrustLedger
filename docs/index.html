<!doctype html>
<!--
  MkDocs serves "/" from index.md, but the docs landing page is Home.md
  (kept as "Home" so it stays the GitHub Wiki landing page). This static
  file is copied verbatim to the site root and redirects "/" to "/Home/".
  wiki-sync only copies *.md, so this file never reaches the wiki.
-->
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="refresh" content="0; url=Home/" />
		<link rel="canonical" href="Home/" />
		<title>TrustLedger Documentation</title>
	</head>
	<body>
		<p>Redirecting to <a href="Home/">the TrustLedger documentation</a>&hellip;</p>
	</body>
</html>
