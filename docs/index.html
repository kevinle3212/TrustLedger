<!doctype html>
<!--
  MkDocs serves "/" from index.md, but the docs landing page is Home.md.
  This static file is copied verbatim to the site root and redirects "/" to
  "/Home/". The GitHub Wiki sync generates its own Home.md table of contents
  that points to rendered GitHub Pages docs.
-->
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="refresh" content="0; url=Home/" />
		<link rel="canonical" href="Home/" />
		<title>TrustLedger Documentation</title>
	</head>
	<body>
		<p>Redirecting to <a href="Home/">the TrustLedger documentation</a>&hellip;</p>
	</body>
</html>
