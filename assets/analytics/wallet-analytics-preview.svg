<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">TrustLedger Wallet Analytics Preview</title>
  <desc id="desc">Privacy-safe aggregate contract status visualization for a connected TrustLedger wallet.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .title { fill: #111827; font: 700 42px system-ui, -apple-system, sans-serif; }
    .body { fill: #4b5563; font: 400 20px system-ui, -apple-system, sans-serif; }
    .label { fill: #374151; font: 600 18px system-ui, -apple-system, sans-serif; }
    .value { fill: #111827; font: 700 18px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .track { fill: #e0e7ff; }
    .bar { fill: #3eafac; }
    .metric { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 2; }
    .metricText { fill: #312e81; font: 700 30px system-ui, -apple-system, sans-serif; }
    .metricLabel { fill: #4338ca; font: 600 15px system-ui, -apple-system, sans-serif; }
  </style>
  <rect width="1200" height="675" class="bg"/>
  <rect x="36" y="36" width="1128" height="603" rx="28" class="panel"/>
  <text x="72" y="100" class="title">Privacy-Safe Wallet Analytics</text>
  <text x="72" y="136" class="body">Public contract state, local app preferences, and reputation summaries without private-wallet scraping.</text>
  <g><text x="56" y="132" class="label">Pending</text><rect x="160" y="116" width="300" height="18" rx="9" class="track"/><rect x="160" y="116" width="75.0" height="18" rx="9" class="bar"/><text x="484" y="132" class="value">2</text><text x="56" y="174" class="label">Active</text><rect x="160" y="158" width="300" height="18" rx="9" class="track"/><rect x="160" y="158" width="187.5" height="18" rx="9" class="bar"/><text x="484" y="174" class="value">5</text><text x="56" y="216" class="label">Submitted</text><rect x="160" y="200" width="300" height="18" rx="9" class="track"/><rect x="160" y="200" width="112.5" height="18" rx="9" class="bar"/><text x="484" y="216" class="value">3</text><text x="56" y="258" class="label">Approved</text><rect x="160" y="242" width="300" height="18" rx="9" class="track"/><rect x="160" y="242" width="300.0" height="18" rx="9" class="bar"/><text x="484" y="258" class="value">8</text><text x="56" y="300" class="label">Disputed</text><rect x="160" y="284" width="300" height="18" rx="9" class="track"/><rect x="160" y="284" width="37.5" height="18" rx="9" class="bar"/><text x="484" y="300" class="value">1</text><text x="56" y="342" class="label">Resolved</text><rect x="160" y="326" width="300" height="18" rx="9" class="track"/><rect x="160" y="326" width="150.0" height="18" rx="9" class="bar"/><text x="484" y="342" class="value">4</text></g>
  <rect x="720" y="168" width="176" height="98" rx="22" class="metric"/><text x="748" y="222" class="metricText">23</text><text x="748" y="250" class="metricLabel">Visible Contracts</text><rect x="920" y="168" width="176" height="98" rx="22" class="metric"/><text x="948" y="222" class="metricText">52%</text><text x="948" y="250" class="metricLabel">Completion Rate</text><rect x="720" y="292" width="176" height="98" rx="22" class="metric"/><text x="748" y="346" class="metricText">94</text><text x="748" y="374" class="metricLabel">Privacy Score</text><rect x="920" y="292" width="176" height="98" rx="22" class="metric"/><text x="948" y="346" class="metricText">4.5</text><text x="948" y="374" class="metricLabel">Reputation</text><rect x="720" y="416" width="176" height="98" rx="22" class="metric"/><text x="748" y="470" class="metricText">2.33</text><text x="748" y="498" class="metricLabel">State Entropy</text><rect x="920" y="416" width="176" height="98" rx="22" class="metric"/><text x="948" y="470" class="metricText">+0.09</text><text x="948" y="498" class="metricLabel">Activity Trend</text>
  <text x="72" y="586" class="body">SciPy, Pandas, Seaborn, Bokeh, Plotly, NumPy, SymPy, and Matplotlib power these generated artifacts.</text>
</svg>
