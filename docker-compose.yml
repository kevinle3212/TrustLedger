# TrustLedger - Docker Compose
#
# Build the image once, then use any service below.
#
#   docker compose build
#
#   docker compose up demo-good   # happy path: client approves, freelancer gets 1 ETH
#   docker compose up demo-bad    # dispute flow: jurors vote, freelancer gets ~0.258 ETH
#   docker compose up node        # local chain only (port 8545 open for MetaMask / Remix)
#   docker compose run test       # run all 73 Hardhat tests + Foundry unit + fuzz tests

services:
    demo-good:
        build: .
        environment:
            DEMO: good
        ports:
            - "8545:8545"

    demo-bad:
        build: .
        environment:
            DEMO: bad
        ports:
            - "8545:8545"

    node:
        build: .
        environment:
            DEMO: node
        ports:
            - "8545:8545"

    test:
        build: .
        entrypoint: ["/bin/bash", "-c", "npm run hardhat:test && npm run foundry:test"]
