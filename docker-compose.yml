# TrustLedger - Docker Compose
#
# Build the image once, then use any service below.
#
#   docker compose build
#
#   docker compose up demo-good    # happy path: client approves, freelancer gets 1 ETH
#   docker compose up demo-bad     # dispute flow: jurors vote, freelancer gets ~0.258 ETH
#   docker compose up demo-jurors     # reputation:  minority slash, before/after reputation table
#   docker compose up demo-stablecoin # ERC-20 escrow, gas comparison, bidirectional reputation
#   docker compose up node         # local chain only (port 8545 open for MetaMask / Remix)
#   docker compose run test        # run Hardhat + Foundry tests
#   docker compose run frontend-test # run frontend unit tests

x-trustledger-build: &trustledger-build
    context: .
    dockerfile: Dockerfile

x-demo-service: &demo-service
    build: *trustledger-build
    profiles: ["demo"]
    ports:
        - "${TRUSTLEDGER_RPC_PORT:-8545}:8545"
    restart: "no"

services:
    demo-good:
        <<: *demo-service
        environment:
            DEMO: good

    demo-bad:
        <<: *demo-service
        environment:
            DEMO: bad

    demo-jurors:
        <<: *demo-service
        environment:
            DEMO: jurors

    demo-stablecoin:
        <<: *demo-service
        environment:
            DEMO: stablecoin

    node:
        build: *trustledger-build
        profiles: ["dev"]
        environment:
            DEMO: node
        ports:
            - "${TRUSTLEDGER_RPC_PORT:-8545}:8545"
        healthcheck:
            test: ["CMD-SHELL", "cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"]
            interval: 5s
            timeout: 5s
            retries: 20

    test:
        build: *trustledger-build
        profiles: ["test"]
        entrypoint: ["/bin/bash", "-c", "npm run hardhat:test && npm run foundry:test"]

    frontend-test:
        build: *trustledger-build
        profiles: ["test"]
        entrypoint: ["/bin/bash", "-c", "cd src && npm test -- --runInBand"]

    frontend:
        build:
            context: .
            dockerfile: docker/Dockerfile.frontend
        profiles: ["frontend"]
        environment:
            NODE_ENV: production
            PORT: 3000
            HOSTNAME: 0.0.0.0
        ports:
            - "${TRUSTLEDGER_FRONTEND_PORT:-3000}:3000"
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'node -e "fetch(''http://127.0.0.1:3000/api/health/runtime'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
                ]
            interval: 30s
            timeout: 5s
            retries: 5
