services:
    dev:
        build:
            context: ..
            dockerfile: docker/Dockerfile.dev
        volumes:
            - ..:/app
            - /app/node_modules
            - /app/src/node_modules
        environment:
            NODE_ENV: development
            DEMO: node
        ports:
            - "${TRUSTLEDGER_RPC_PORT:-8545}:8545"
        healthcheck:
            test: ["CMD-SHELL", "cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"]
            interval: 5s
            timeout: 5s
            retries: 20
