title = "TrustLedger gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Generated and vendored paths are excluded from local filesystem scanning."
paths = [
	'''^\.git/''',
	'''^\.impeccable/''',
	'''^\.mypy_cache/''',
	'''^\.nexus/''',
	'''^\.serena/''',
	'''^\.vercel/''',
	'''^artifacts/''',
	'''^cache/''',
	'''^contracts/cache/''',
	'''^contracts/out/''',
	'''^contracts/lib/''',
	'''^dist/''',
	'''^logs/''',
	'''^node_modules/''',
	'''^programs/.*/target/''',
	'''^site/''',
	'''^src/\.next/''',
	'''^src/\.vercel/''',
	'''^src/node_modules/''',
	'''^testing/''',
	'''^tmp/''',
]

[[allowlists]]
description = "Documentation intentionally references placeholder secret names and safe examples."
paths = [
	'''^docs/''',
	'''^README\.md$''',
	'''^SECURITY\.md$''',
	'''^NOTES\.md$''',
	'''^AGENTS\.md$''',
	'''^\.codex/AGENTS\.md$''',
]
regexes = [
	'''(?i)(example|placeholder|redacted|changeme|dummy|test|your[-_ ]?(key|token|secret|url)?)''',
]

[[allowlists]]
description = "WalletConnect/Reown public wallet registry IDs are not provider access tokens. The regex is the exact public Coinbase Wallet registry ID, scoped to src/lib/walletIds.ts."
targetRules = ["coinbase-access-token"]
paths = [
	'''^src/lib/walletIds\.ts$''',
]
regexes = [
	'''^d0ca99ff52b99abc48743dad0f7fc891e041be73574f7fac4afe5d4bb83845c8$''',
]
condition = "AND"
