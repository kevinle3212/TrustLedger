# Lint configuration — maximum strictness.
# No lints are excluded: every forge-lint rule (gas, security, style, including
# asm-keccak256) is reported. `severity` restricts the run to high/med/low/info/gas
# so nothing is silently dropped.
[lint]
exclude_lints = []
severity = ["high", "med", "low", "info", "gas"]

# Formatter configuration — explicit, strict, and deterministic so `forge fmt --check`
# is the single source of truth for Solidity style (solhint owns rule/lint concerns only).
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false        # `import {X}` — Foundry canonical, not `{ X }`
int_types = "long"             # always `uint256`, never `uint`
multiline_func_header = "all"  # one parameter per line on multiline headers
quote_style = "double"
number_underscore = "thousands"
hex_underscore = "remove"
single_line_statement_blocks = "multi"
override_spacing = false
wrap_comments = true           # reflow comments to line_length
sort_imports = false           # import ordering is enforced by solhint (imports-order)

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
deny = "warnings"              # treat every solc compiler warning as a hard error

[profile.default.fuzz]
runs = 10000
seed = "0x1"

[profile.default.invariant]
runs = 256
depth = 500

# CI profile - referenced by FOUNDRY_PROFILE=ci in ci.yml.
# Reduces fuzz/invariant runs to keep the CI job under 5 minutes
# while still catching most edge cases.
[profile.ci]
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.ci.fuzz]
runs = 256
seed = "0x1"

[profile.ci.invariant]
runs = 64
depth = 100

# Staging profile - production-identical optimizer settings with more thorough
# fuzz/invariant coverage than CI. Includes fork tests when RPC URLs are set.
# Run with: FOUNDRY_PROFILE=staging forge test -vvv
[profile.staging]
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.staging.fuzz]
runs = 2500
seed = "0x1"

[profile.staging.invariant]
runs = 128
depth = 250

[rpc_endpoints]
sepolia      = "${SEPOLIA_RPC_URL}"
arbitrum     = "${ARBITRUM_RPC_URL}"
base         = "${BASE_RPC_URL}"
optimism     = "${OPTIMISM_RPC_URL}"

[etherscan]
sepolia   = { key = "${ETHERSCAN_API_KEY}",           chain = 11155111 }
arbitrum  = { key = "${ARBISCAN_API_KEY}",             chain = 42161    }
base      = { key = "${BASESCAN_API_KEY}",             chain = 8453     }
optimism  = { key = "${OPTIMISM_ETHERSCAN_API_KEY}",   chain = 10       }
