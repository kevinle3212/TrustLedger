site_name: TrustLedger
site_description: A decentralized escrow and dispute resolution protocol for freelance and contract agreements, built on Ethereum.
site_url: https://kevinle3212.github.io/TrustLedger
site_author: TrustLedger
repo_name: kevinle3212/TrustLedger
repo_url: https://github.com/kevinle3212/TrustLedger
edit_uri: edit/main/docs/
copyright: Copyright &copy; TrustLedger

theme:
    name: material
    logo: assets/logos/logo.png
    favicon: assets/icons/favicon.ico
    icon:
        repo: fontawesome/brands/github
        edit: material/pencil
        view: material/eye
    palette:
        # Light mode
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: deep purple
          accent: purple
          toggle:
              icon: material/weather-night
              name: Switch to dark mode
        # Dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: deep purple
          accent: purple
          toggle:
              icon: material/weather-sunny
              name: Switch to light mode
    font:
        text: Inter
        code: JetBrains Mono
    features:
        # Navigation
        - navigation.instant
        - navigation.instant.progress
        - navigation.tracking
        - navigation.tabs
        - navigation.sections
        - navigation.top
        - navigation.footer
        - toc.follow
        # Search
        - search.highlight
        - search.suggest
        - search.share
        # Content
        - content.code.copy
        - content.code.annotate
        - content.tabs.link
        - content.tooltips
        - content.action.edit
        - content.action.view

nav:
    - Home: Home.md
    - Architecture: ARCHITECTURE.md
    - Smart Contracts: SMART-CONTRACTS.md
    - Escrow Lifecycle: ESCROW-LIFECYCLE.md
    - Arbitration: ARBITRATION.md
    - Deployment: DEPLOYMENT.md
    - Testing: TESTING.md
    - Security: SECURITY.md
    - Audit Readiness: AUDIT-READINESS.md
    - GitHub Rulesets: GITHUB-RULESETS.md
    - Legal And Compliance: LEGAL.md
    - Admin Dashboard: ADMIN.md
    - Environment: ENVIRONMENT.md
    - Sepolia Faucets: FAUCETS.md
    - CI/CD: CI-CD.md
    - CodeRabbit: CODERABBIT.md
    - Contributing: CONTRIBUTING.md
    - Frontend: FRONTEND.md
    - Analytics And Native Kernels: ANALYTICS.md
    - Oracle: ORACLE.md
    - Solana: SOLANA.md
    - Utilities: UTILITIES.md
    - Type Stubs: STUBS.md
    - SWC And Artifacts: SWC.md
    - TypeScript SDK: TYPESCRIPT-SDK.md
    - Wallets: WALLETS.md
    - FAQ: FAQ.md
    - Docker: DOCKER.md
    - Kubernetes: KUBERNETES.md
    - GitHub Models: GITHUB_MODELS.md
    - Contract Reference: CONTRACTS.md
    - Reports:
          - Audit Report: reports/audit-report.md
          - Coverage Gap Report: reports/coverage-gap-report.md
          - Dependency Health Report: reports/dependency-health-report.md
    - Miscellaneous: MISCELLANEOUS.md
    - Presentation: PRESENTATION.md
    - Demo: DEMO.md

docs_dir: docs

extra_css:
    - css/extra.css

hooks:
    - tools/mkdocs_hooks.py

extra:
    social:
        - icon: fontawesome/brands/github
          link: https://github.com/kevinle3212/TrustLedger
          name: TrustLedger on GitHub
    generator: false

plugins:
    - search

markdown_extensions:
    - pymdownx.highlight:
          anchor_linenums: true
          line_spans: __span
          pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tabbed:
          alternate_style: true
    - pymdownx.details
    - pymdownx.tasklist:
          custom_checkbox: true
    - pymdownx.emoji:
          emoji_index: !!python/name:material.extensions.emoji.twemoji
          emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - admonition
    - attr_list
    - md_in_html
    - footnotes
    - tables
    - toc:
          permalink: true
