# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
    # ── npm (root package.json) ────────────────────────────────────────────────
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      groups:
          dev-dependencies:
              dependency-type: "development"
      ignore:
          # Hardhat v3 is ESM-only and requires a planned migration from v2.
          # Ignore major bumps until the Hardhat v3 migration is scheduled.
          - dependency-name: "hardhat"
            update-types: ["version-update:semver-major"]
          - dependency-name: "@nomicfoundation/hardhat-ethers"
            update-types: ["version-update:semver-major"]
          - dependency-name: "@nomicfoundation/hardhat-toolbox"
            update-types: ["version-update:semver-major"]

    # ── GitHub Actions (.github/workflows/) ───────────────────────────────────
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"

    # ── Docker base images (docker/Dockerfile.*) ──────────────────────────────
    - package-ecosystem: "docker"
      directory: "/docker"
      schedule:
          interval: "weekly"

    # ── Git submodules (contracts/lib/forge-std, contracts/lib/openzeppelin-contracts) ──
    - package-ecosystem: "gitsubmodule"
      directory: "/"
      schedule:
          interval: "weekly"
