# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
    # ── npm (root package.json) ────────────────────────────────────────────────
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      # Supply-chain cooldown: wait before adopting freshly published versions so
      # a compromised release has time to be caught and yanked before it lands.
      cooldown:
          default-days: 7
          semver-major-days: 30
          semver-minor-days: 7
          semver-patch-days: 3
      groups:
          dev-dependencies:
              dependency-type: "development"
      ignore:
          # Hardhat v3 is ESM-only and requires a planned migration from v2.
          # Ignore major bumps until the Hardhat v3 migration is scheduled.
          - dependency-name: "hardhat"
            update-types: ["version-update:semver-major"]
          - dependency-name: "@nomicfoundation/hardhat-ethers"
            update-types: ["version-update:semver-major"]
          - dependency-name: "@nomicfoundation/hardhat-toolbox"
            update-types: ["version-update:semver-major"]

    # ── GitHub Actions (.github/workflows/) ───────────────────────────────────
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      # semver-*-days are only valid for semver ecosystems (npm); actions/docker
      # support default-days only.
      cooldown:
          default-days: 7

    # ── Docker base images (docker/Dockerfile.*) ──────────────────────────────
    - package-ecosystem: "docker"
      directory: "/docker"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 7

    # ── Git submodules (contracts/lib/forge-std, contracts/lib/openzeppelin-contracts) ──
    - package-ecosystem: "gitsubmodule"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 7
