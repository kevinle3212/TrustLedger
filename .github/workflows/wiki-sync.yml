name: Sync Docs to Wiki

on:
    push:
        branches: [main]
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - ".github/workflows/wiki-sync.yml"
    workflow_dispatch:

concurrency:
    group: wiki-sync
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    sync:
        name: Sync rendered docs table of contents to GitHub Wiki
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Clone wiki
              run: |
                  git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki

            - name: Generate wiki home
              run: |
                  node tools/generate-wiki-home.mjs > wiki/Home.md

            - name: Remove raw synced docs
              run: |
                  find wiki -maxdepth 1 -type f -name '*.md' ! -name 'Home.md' -delete

            - name: Commit and push
              run: |
                  cd wiki
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add .
                  git diff --staged --quiet && echo "No changes to sync." || git commit -m "chore: sync docs from main"
                  git push
