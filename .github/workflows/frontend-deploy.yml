name: Deploy Frontend (GitHub Pages)

on:
    push:
        branches: [main]
        paths:
            - "src/**"
            - "artifacts/deployed-addresses.json"
            - ".github/workflows/frontend-deploy.yml"
    workflow_dispatch:

concurrency:
    group: pages
    cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        name: Build Next.js
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  # Add NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID as a repo/environment secret
                  # (Settings -> Secrets -> Actions) to enable WalletConnect on the live site.
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || '' }}
                  # GitHub Pages serves the site at /TrustLedger unless a custom domain is set.
                  NEXT_BASE_PATH: /TrustLedger
                  # NEXT_PUBLIC_TRUSTLEDGER_ADDRESS is intentionally omitted here.
                  # next.config.ts reads it automatically from artifacts/deployed-addresses.json.

            - name: Add .nojekyll
              run: touch out/.nojekyll

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: src/out

    deploy:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
