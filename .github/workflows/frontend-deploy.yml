name: Deploy Frontend (GitHub Pages)

on:
    push:
        branches: [main]
        paths:
            - "frontend/**"
            - ".github/workflows/frontend-deploy.yml"
    workflow_dispatch:

concurrency:
    group: pages
    cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        name: Build Next.js
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  # Neither value is sensitive — both are visible in the browser bundle.
                  # Update these when you get a WalletConnect project ID or redeploy the contract.
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""
                  NEXT_PUBLIC_TRUSTLEDGER_ADDRESS: "0x0000000000000000000000000000000000000000"

            - name: Add .nojekyll
              run: touch out/.nojekyll

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: frontend/out

    deploy:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
