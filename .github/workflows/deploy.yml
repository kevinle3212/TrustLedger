name: Deploy (Ethereum Sepolia)

# Manual trigger only. Never auto-deploy on push to main - too easy to
# burn through testnet ETH or push a broken contract.
on:
    workflow_dispatch:
        inputs:
            script:
                description: "Forge script target (path:Contract)"
                required: true
                default: "script/Deploy.s.sol:Deploy"
            verify:
                description: "Verify on Etherscan after deploy"
                required: true
                default: "true"
                type: choice
                options:
                    - "true"
                    - "false"

# Don't run two deploys to the same network at once.
concurrency:
    group: deploy-ethereum-sepolia
    cancel-in-progress: false

permissions:
    contents: read
    # Needed to trigger frontend-deploy.yml after contracts are deployed.
    actions: write

jobs:
    deploy:
        name: Deploy to Ethereum Sepolia
        runs-on: ubuntu-latest
        # Bind secrets to a GitHub Environment so you can add reviewer approval later.
        environment:
            name: ethereum-sepolia
        # foundry.toml lives in contracts/ — all forge run: steps execute from there.
        defaults:
            run:
                working-directory: contracts
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  submodules: recursive

            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1
              with:
                  version: stable
              env:
                  # Avoid foundryup 403 from api.github.com rate limit on shared runner IPs.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Build
              run: forge build

            # Re-run tests before deploy. If main is green this is cheap insurance.
            - name: Pre-deploy tests
              run: forge test

            - name: Deploy (with Etherscan verification)
              if: github.event.inputs.verify == 'true'
              run: |
                  forge script ${{ github.event.inputs.script }} \
                    --rpc-url "$SEPOLIA_RPC_URL" \
                    --private-key "$DEPLOYER_PRIVATE_KEY" \
                    --broadcast \
                    --verify \
                    --etherscan-api-key "$ETHERSCAN_API_KEY" \
                    --chain 11155111 \
                    -vvvv
              env:
                  SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
                  DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
                  ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

            - name: Deploy (no verification)
              if: github.event.inputs.verify != 'true'
              run: |
                  forge script ${{ github.event.inputs.script }} \
                    --rpc-url "$SEPOLIA_RPC_URL" \
                    --private-key "$DEPLOYER_PRIVATE_KEY" \
                    --broadcast \
                    -vvvv
              env:
                  SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
                  DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}

            # Keep deployment receipts/addresses for the audit trail.
            - name: Upload broadcast artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: broadcast-${{ github.run_id }}
                  path: contracts/broadcast/
                  retention-days: 30

            # Parse the Forge broadcast output for all three deployed contract addresses.
            # Broadcast is written to contracts/broadcast/Deploy.s.sol/11155111/run-latest.json.
            - name: Extract deployed contract addresses
              id: addresses
              run: |
                  BROADCAST=broadcast/Deploy.s.sol/11155111/run-latest.json
                  TL=$(jq -r '.transactions[] | select(.contractName == "TrustLedger") | .contractAddress' "$BROADCAST")
                  ARB=$(jq -r '.transactions[] | select(.contractName == "Arbitration") | .contractAddress' "$BROADCAST")
                  JR=$(jq -r '.transactions[] | select(.contractName == "JurorRegistry") | .contractAddress' "$BROADCAST")
                  echo "trustledger=$TL" >> "$GITHUB_OUTPUT"
                  echo "arbitration=$ARB" >> "$GITHUB_OUTPUT"
                  echo "juror_registry=$JR" >> "$GITHUB_OUTPUT"
                  echo "Deployed TrustLedger: $TL"
                  echo "Deployed Arbitration: $ARB"
                  echo "Deployed JurorRegistry: $JR"

            # Upsert all three contract addresses in Vercel so the next frontend
            # build picks up the new addresses without any manual env var editing.
            # Requires VERCEL_TOKEN, VERCEL_PROJECT_ID, and VERCEL_ORG_ID secrets
            # to be set in the ethereum-sepolia environment (or as repo secrets).
            - name: Update contract addresses in Vercel
              run: |
                  TEAM_QUERY=""
                  if [ -n "$VERCEL_ORG_ID" ]; then
                    TEAM_QUERY="?teamId=$VERCEL_ORG_ID"
                  fi

                  upsert_env() {
                    local KEY="$1" VAL="$2"
                    ENV_ID=$(curl -sf \
                      "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env$TEAM_QUERY" \
                      -H "Authorization: Bearer $VERCEL_TOKEN" | \
                      jq -r --arg k "$KEY" '.envs // [] | .[] | select(.key == $k) | .id' | head -1)
                    if [ -n "$ENV_ID" ] && [ "$ENV_ID" != "null" ]; then
                      curl -sf -X PATCH \
                        "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ENV_ID$TEAM_QUERY" \
                        -H "Authorization: Bearer $VERCEL_TOKEN" \
                        -H "Content-Type: application/json" \
                        -d "{\"value\":\"$VAL\",\"target\":[\"production\",\"preview\"]}"
                      echo "Updated $KEY → $VAL"
                    else
                      curl -sf -X POST \
                        "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env$TEAM_QUERY" \
                        -H "Authorization: Bearer $VERCEL_TOKEN" \
                        -H "Content-Type: application/json" \
                        -d "{\"key\":\"$KEY\",\"value\":\"$VAL\",\"target\":[\"production\",\"preview\"],\"type\":\"plain\"}"
                      echo "Created $KEY → $VAL"
                    fi
                  }

                  upsert_env "NEXT_PUBLIC_TRUSTLEDGER_ADDRESS" "${{ steps.addresses.outputs.trustledger }}"
                  upsert_env "NEXT_PUBLIC_ARBITRATION_ADDRESS" "${{ steps.addresses.outputs.arbitration }}"
                  upsert_env "NEXT_PUBLIC_JUROR_REGISTRY_ADDRESS" "${{ steps.addresses.outputs.juror_registry }}"
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

            # Kick off a fresh Vercel production build so it picks up the new env var.
            - name: Trigger frontend redeploy
              run: |
                  curl -sf -X POST \
                    "https://api.github.com/repos/${{ github.repository }}/actions/workflows/frontend-deploy.yml/dispatches" \
                    -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    -d '{"ref":"main"}'
                  echo "Triggered frontend-deploy.yml"
