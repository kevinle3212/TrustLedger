name: Local Hygiene

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    schedule:
        # Weekly policy check so ignored local hygiene tooling stays healthy
        # even when no local hooks run.
        - cron: "0 14 * * 1"
    workflow_dispatch:

concurrency:
    group: log-hygiene-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    local-hygiene:
        name: Logs and tmp retention
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Check log retention
              run: npm run logs:check

            - name: Check tmp retention
              run: npm run tmp:check

            - name: Check log Markdown
              run: npm run lint:logs
