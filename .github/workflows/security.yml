name: Security

on:
    pull_request:
        branches: [main]
    push:
    schedule:
        # Weekly full scan, Mondays at 13:00 UTC (catches CVEs published in
        # transitive deps even if no commits land that week).
        - cron: "0 13 * * 1"
    workflow_dispatch:

concurrency:
    group: security-${{ github.ref }}
    cancel-in-progress: true

# security-events: write is required to upload SARIF to the GitHub Security tab.
permissions:
    contents: read
    security-events: write

jobs:
    contract-vendors:
        name: Contract vendor freshness
        runs-on: ubuntu-latest
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  submodules: recursive

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Check OpenZeppelin and forge-std freshness
              run: npm run contracts:vendor:check:remote

    # ---------------------------------------------------------------------------
    # Solidity static analysis. Slither is the industry workhorse for finding
    # reentrancy, uninitialized storage, shadowed vars, dangerous low-level calls,
    # etc. Output goes to the Security tab as SARIF so you get inline PR comments.
    # ---------------------------------------------------------------------------
    slither:
        name: Slither (Solidity SAST)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  submodules: recursive

            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1
              with:
                  version: stable
              env:
                  # Avoid foundryup 403 from api.github.com rate limit on shared runner IPs.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Run Slither
              id: slither
              uses: crytic/slither-action@v0.4.2
              with:
                  # Point at contracts/ so Slither finds foundry.toml there.
                  target: contracts
                  # Skip lib/ (forge-std, OZ) and test/ noise. Only fail on medium+.
                  slither-args: '--filter-paths "lib/|test/" --exclude-informational --exclude-low'
                  fail-on: medium
                  sarif: results.sarif
              # Blocking: a medium+ Slither finding fails the job. Suppress
              # triaged false positives in contracts/slither.config or with
              # inline `// slither-disable-next-line <check>` plus justification.

            - name: Upload SARIF to GitHub Security
              # hashFiles returns '' when the file does not exist, preventing a
              # "path does not exist" error when Slither produces no findings.
              if: always() && hashFiles('results.sarif') != ''
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: results.sarif
                  category: slither

    # ---------------------------------------------------------------------------
    # Secret scanning. Critical for this project specifically because you've got
    # .env files, deployer private keys, and Etherscan API keys floating around.
    # Catches accidental commits before they hit a public mirror.
    # ---------------------------------------------------------------------------
    trufflehog:
        name: TruffleHog (secret scanning)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  # Full git history. Secrets often slip in via squashed/old commits.
                  fetch-depth: 0

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@v3.95.7
              with:
                  # Explicit base/head pins the scan to the git diff. Without them
                  # the action falls back to a *filesystem* scan, which reads
                  # untracked/gitignored files (e.g. a local .env with live keys)
                  # and fails on secrets that were never committed. On schedule/
                  # manual runs these refs are empty, so the action scans full
                  # git history instead — still git-only, never the filesystem.
                  base: ${{ github.event.pull_request.base.sha || github.event.before }}
                  head: ${{ github.event.pull_request.head.sha || github.sha }}
                  # 'verified' = TruffleHog confirmed the secret is live.
                  # 'unknown'  = looks like a credential but couldn't verify (review manually).
                  # exclude-paths is defense-in-depth for any filesystem fallback.
                  extra_args: --results=verified,unknown --exclude-paths=.github/trufflehog-exclude.txt

    gitleaks:
        name: Gitleaks (secret scanning)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v3
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITLEAKS_CONFIG: .gitleaks.toml

    # ---------------------------------------------------------------------------
    # Dependency vulnerabilities. Catches CVEs in your npm dep tree
    # (Hardhat, ethers, ts-node, etc.).
    # ---------------------------------------------------------------------------
    dependencies:
        name: Dependency audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Log retention check
              run: npm run logs:check

            - name: Tmp retention check
              run: npm run tmp:check

            - name: Run audit
              # Blocking: --omit=dev scans prod deps only; a high+ advisory fails
              # the job. Tighten to 'moderate' once the tree stays clean there.
              run: npm audit --omit=dev --audit-level=high

    # ---------------------------------------------------------------------------
    # Separate audit for the frontend (src/) package tree, which is independent
    # of the root npm workspace (Hardhat, TypeChain, etc.).
    # ---------------------------------------------------------------------------
    frontend-dependencies:
        name: Frontend dependency audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/package-lock.json

            - name: Install frontend dependencies
              run: npx --yes npm@11.12.1 ci
              working-directory: src

            - name: Run audit
              run: npx --yes npm@11.12.1 audit --omit=dev --audit-level=high
              working-directory: src

    # ---------------------------------------------------------------------------
    # OSV-Scanner (Google's vulnerability scanner) cross-checks every committed
    # lockfile against the OSV database. It catches advisories npm audit misses
    # (e.g. GitHub Security Advisories without npm equivalents) and covers the
    # root, frontend, and any nested lockfiles in one pass. SARIF lands in the
    # Security tab. Blocking: a discovered CVE fails the job.
    # ---------------------------------------------------------------------------
    osv-scanner:
        name: OSV-Scanner (dependency CVEs)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            # Scoped to the lockfiles we own and ship. Vendored submodules
            # (contracts/lib/*) carry upstream's own dev lockfiles and are out of
            # scope here, matching the Slither/Semgrep exclusions. Dev-only
            # sub-high advisories are filtered via osv-scanner.toml.
            - name: Run OSV-Scanner
              uses: google/osv-scanner-action/osv-scanner-action@v2.2.4
              with:
                  scan-args: |-
                      --config=osv-scanner.toml
                      --lockfile=package-lock.json
                      --lockfile=src/package-lock.json
                      --format=sarif
                      --output=osv-results.sarif

            - name: Upload SARIF to GitHub Security
              if: always() && hashFiles('osv-results.sarif') != ''
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: osv-results.sarif
                  category: osv-scanner

    # ---------------------------------------------------------------------------
    # CodeQL on the TypeScript side. Free for public repos. Catches things like
    # path traversal, prototype pollution, SSRF in any backend/scripts.
    # ---------------------------------------------------------------------------
    codeql:
        name: CodeQL (TypeScript)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: javascript-typescript
                  # security-extended adds higher-precision queries beyond the defaults.
                  queries: security-extended

            - name: Analyze
              uses: github/codeql-action/analyze@v4
              with:
                  category: "/language:javascript-typescript"

    # ---------------------------------------------------------------------------
    # Semgrep SAST. Covers JS/TS/React/Next.js security rules, secrets, and
    # supply-chain checks. Free for public repos via the semgrep-action.
    # ---------------------------------------------------------------------------
    semgrep:
        name: Semgrep (SAST)
        runs-on: ubuntu-latest
        container:
            image: semgrep/semgrep
        # Only run on PRs to avoid duplicate runs on push to main (CodeQL covers
        # main). Semgrep OSS is free for open-source repositories.
        if: github.actor != 'dependabot[bot]'
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            # `auto` is augmented with explicit curated rule packs so coverage no
            # longer depends on Semgrep's registry heuristics: OWASP Top Ten,
            # secrets, and the JS/TS/React/Next.js security and supply-chain sets.
            - name: Run Semgrep
              run: >
                  semgrep scan
                  --config auto
                  --config p/owasp-top-ten
                  --config p/secrets
                  --config p/javascript
                  --config p/typescript
                  --config p/react
                  --config p/nextjs
                  --sarif
                  --output semgrep.sarif
                  --exclude "contracts/lib"
                  --exclude "artifacts"
                  --exclude "contracts/out"
                  --exclude "contracts/cache"
                  --exclude "hardhat-cache"
                  --exclude "src/.next"
                  --exclude "node_modules"
                  --exclude "site"
                  --error

            - name: Upload SARIF to GitHub Security
              if: always() && hashFiles('semgrep.sarif') != ''
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: semgrep.sarif
                  category: semgrep
