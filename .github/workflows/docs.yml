name: Deploy Docs to GitHub Pages

on:
    push:
        branches: [main]
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "requirements-docs.txt"
            - "package-lock.json"
            - "package.json"
            - "tools/check-logs.mjs"
            - "tools/mkdocs-build-strict.sh"
    workflow_dispatch:

# Allow one concurrent Pages deployment; let in-progress runs finish.
concurrency:
    group: pages
    cancel-in-progress: false

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        name: Build MkDocs site
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Set up Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
              with:
                  python-version: "3.x"

            - name: Set up Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm

            - name: Configure Pages
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

            - name: Install MkDocs and Material theme
              run: pip install -r requirements-docs.txt

            - name: Check log Markdown policy
              run: |
                  if [ -f package.json ]; then
                    npm ci
                    npm run logs:check
                    npm run tmp:check
                    npm run lint:logs
                  fi

            - name: Build site
              run: python -m mkdocs build --strict

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
              with:
                  path: site

    deploy:
        name: Deploy to GitHub Pages
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy
              id: deployment
              # Suppress the Node DEP0040 punycode warning emitted from the
              # action's own bundled whatwg-url dependency (upstream, not our
              # code). Scoped to this step so deprecations in our build job still
              # surface.
              env:
                  NODE_OPTIONS: --no-deprecation
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
