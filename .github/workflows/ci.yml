name: CI

on:
    push:
    pull_request:
        branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

# Least-privilege token. Read is enough for checkout.
permissions:
    contents: read

jobs:
    frontend:
        name: Frontend (typecheck + lint + build)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/package-lock.json

            - name: Install dependencies
              run: npx --yes npm@11.12.1 ci

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Frontend quality command
              run: npm run quality

            - name: Build
              run: npm run build:frontend
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""

            - name: Playwright E2E
              run: npm run test:e2e
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""

    lighthouse:
        name: Lighthouse CI (performance budgets)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/package-lock.json

            - name: Install dependencies
              run: npx --yes npm@11.12.1 ci

            - name: Build
              run: npm run build:frontend
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""

            # LHCI runs via npx to avoid lockfile churn. Assertions are
            # error-level (src/.lighthouserc.json): a budget miss fails the job.
            - name: Run Lighthouse CI
              run: npx --yes @lhci/cli@0.15.x autorun
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""

    e2e-wallet:
        name: E2E (connected wallet, mock connector)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/package-lock.json

            - name: Install dependencies
              run: npx --yes npm@11.12.1 ci

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            # The mock-wallet flag is inlined at build time, so the connected
            # suite needs its own build. The deterministic mock connector
            # (NEXT_PUBLIC_E2E_MOCK_WALLET=1) reports a connected account without
            # a real wallet; contract reads stay disabled (zero-address).
            - name: Build (mock wallet)
              run: npm run build:frontend
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""
                  NEXT_PUBLIC_E2E_MOCK_WALLET: "1"

            - name: Playwright E2E (connected)
              run: npm run test:e2e:wallet
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""
                  NEXT_PUBLIC_E2E_MOCK_WALLET: "1"

    typescript:
        name: TypeScript (lint + typecheck)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  submodules: recursive

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install Gitleaks
              env:
                  GITLEAKS_VERSION: 8.30.1
              run: |
                  set -euo pipefail
                  # Download release assets directly. The asset names are
                  # deterministic, so we avoid the api.github.com releases
                  # endpoint, whose unauthenticated 60-req/hr rate limit is
                  # routinely exhausted on shared runners and returns HTTP 403.
                  # Release download URLs are not subject to that API limit.
                  base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
                  archive_name="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
                  curl -fsSL "${base}/${archive_name}" -o gitleaks.tar.gz
                  curl -fsSL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
                  grep " ${archive_name}$" checksums.txt | sed "s# ${archive_name}# gitleaks.tar.gz#" | sha256sum --check
                  tar -xzf gitleaks.tar.gz gitleaks
                  sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
                  gitleaks version

            - name: Contract vendor cleanliness
              run: npm run contracts:vendor:check

            - name: Install dependencies
              run: npm ci

            - name: Sensitive file guard
              run: npm run secrets:check

            - name: Compile contracts (generates TypeChain types for ESLint)
              run: npm run compile

            - name: Log retention check
              run: npm run logs:check

            - name: Tmp retention check
              run: npm run tmp:check

            - name: TypeScript typecheck
              run: npx tsc -p tsconfig.hardhat.json --noEmit

            - name: Setup kubectl
              env:
                  KUBECTL_VERSION: v1.34.2
              run: |
                  curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
                  curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
                  echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
                  sudo install -m 0755 kubectl /usr/local/bin/kubectl
                  kubectl version --client=true

            # Foundry is not installed in this job, so skip lint:forge (forge
            # fmt/lint is owned by the Solidity job). Run only the node-based
            # linters here plus Kubernetes manifest validation.
            - name: ESLint + Solhint + markdownlint
              run: npm run lint:config && npm run lint:ts && npm run lint:js && npm run lint:sol && npm run lint:md && npm run lint:cursor && npm run lint:k8s && npm run lint:logs

            - name: Docs navigation check
              run: npm run docs:nav:check

            - name: Prettier check
              run: npx prettier --check .

    python:
        name: Python (mypy)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install Node dependencies
              run: npm ci

            # `.python-version` pins 3.14.2. setup-python@v6 parses the comment
            # lines in that file; older releases do not, so keep this pinned to a
            # recent major. Falls back to the literal version if the file changes.
            - name: Setup Python
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
              with:
                  python-version-file: .python-version
                  cache: pip

            # Install mypy plus the type stubs the sources need. types-reportlab
            # is pinned in utils/requirements.txt; the Azure AI Inference SDK
            # ships no stubs and is ignored in mypy.ini, so its runtime package
            # is not required just to type-check.
            - name: Install mypy and type stubs
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install mypy==2.1.0
                  python -m pip install -r utils/requirements.txt
                  python -m pip install -r scripts/analytics/requirements.txt

            - name: Type-check Python sources
              run: npm run lint:py

            - name: Check analytics visualization asset
              run: npm run analytics:check

    native:
        name: Native (C + C++ + ASM)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Compile native analytics kernels
              run: npm run native:check

    hardhat:
        name: Hardhat (compile + test)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  submodules: recursive

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Compile contracts (generates TypeChain types)
              run: npm run compile

            - name: Log retention check
              run: npm run logs:check

            - name: Tmp retention check
              run: npm run tmp:check

            - name: Run Hardhat tests
              run: npm run hardhat:test

    solidity:
        name: Solidity (forge build + test)
        runs-on: ubuntu-latest
        # foundry.toml lives in contracts/ - all `run:` steps execute from there.
        # `uses:` steps (checkout, toolchain) are unaffected by this setting.
        defaults:
            run:
                working-directory: contracts
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  submodules: recursive

            # Pin to a specific release rather than `stable`. `stable` floats:
            # a newer forge added a `block-timestamp` lint that runs on build and
            # aborts on warnings, breaking CI while local toolchains lagged behind.
            # Pinning keeps CI deterministic and aligned with the local version.
            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
              with:
                  version: v1.5.1
              env:
                  # Avoid foundryup 403 from api.github.com rate limit on shared runner IPs.
                  # foundry-toolchain has no `github-token` input; it reads GITHUB_TOKEN.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Show Forge version
              run: forge --version

            - name: Check Solidity formatting
              run: forge fmt --check

            - name: Build contracts
              run: forge build --sizes

            - name: Run tests
              run: forge test -vvv
              env:
                  FOUNDRY_PROFILE: ci

            - name: Gas snapshot diff (informational, non-blocking)
              run: forge snapshot --check || true

    rust:
        name: Rust (build + lint + test)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
              with:
                  toolchain: 1.89.0
                  components: rustfmt, clippy

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install Node dependencies
              run: npm ci

            - name: Build Rust workspace
              run: npm run rust:build

            - name: Check Rust formatting
              run: npm run rust:fmt

            - name: Run Clippy
              run: npm run rust:clippy

            - name: Run Rust tests
              run: npm run rust:test

            - name: Check Solana program formatting
              run: npm run solana:program:fmt

            - name: Check Solana program
              run: npm run solana:program:check

            - name: Check Solana staking program formatting
              run: npm run solana:staking:fmt

            - name: Check Solana staking program
              run: npm run solana:staking:check

            - name: Run Solana staking program tests
              run: npm run solana:staking:test
