name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

# Least-privilege token. Read is enough for checkout.
permissions:
    contents: read

jobs:
    frontend:
        name: Frontend (typecheck + lint + build)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/package-lock.json

            - name: Install dependencies
              run: npx --yes npm@11.12.1 ci

            - name: TypeScript typecheck
              run: npx tsc --noEmit

            - name: Lint (ESLint + Prettier)
              run: npm run lint:frontend

            - name: Build
              run: npm run build:frontend
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""

    typescript:
        name: TypeScript (lint + typecheck)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Compile contracts (generates TypeChain types for ESLint)
              run: npm run compile

            - name: TypeScript typecheck
              run: npx tsc -p tsconfig.hardhat.json --noEmit

            # Foundry is not installed in this job, so skip lint:forge (forge
            # fmt/lint is owned by the Solidity job). Run only the node-based
            # linters here: ESLint, Solhint, and markdownlint.
            - name: ESLint + Solhint + markdownlint
              run: npm run lint:ts && npm run lint:sol && npm run lint:md

            - name: Prettier check
              run: npx prettier --check .

    hardhat:
        name: Hardhat (compile + test)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Compile contracts (generates TypeChain types)
              run: npm run compile

            - name: Run Hardhat tests
              run: npm run hardhat:test

    solidity:
        name: Solidity (forge build + test)
        runs-on: ubuntu-latest
        # foundry.toml lives in contracts/ - all `run:` steps execute from there.
        # `uses:` steps (checkout, toolchain) are unaffected by this setting.
        defaults:
            run:
                working-directory: contracts
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            # Pin to a specific release rather than `stable`. `stable` floats:
            # a newer forge added a `block-timestamp` lint that runs on build and
            # aborts on warnings, breaking CI while local toolchains lagged behind.
            # Pinning keeps CI deterministic and aligned with the local version.
            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1
              with:
                  version: v1.5.1
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Show Forge version
              run: forge --version

            - name: Check Solidity formatting
              run: forge fmt --check

            - name: Build contracts
              run: forge build --sizes

            - name: Run tests
              run: forge test -vvv
              env:
                  FOUNDRY_PROFILE: ci

            - name: Gas snapshot diff (informational, non-blocking)
              run: forge snapshot --check || true
