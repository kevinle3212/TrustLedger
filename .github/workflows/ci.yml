name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

# Least-privilege token. Read is enough for checkout.
permissions:
    contents: read

jobs:
    frontend:
        name: Frontend (typecheck + lint + build)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: src
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: src/package-lock.json

            - name: Install dependencies
              run: npx --yes npm@11.12.1 ci

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Frontend quality command
              run: npm run quality

            - name: Build
              run: npm run build:frontend
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""

            - name: Playwright E2E
              run: npm run test:e2e
              env:
                  NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ""

    typescript:
        name: TypeScript (lint + typecheck)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Contract vendor cleanliness
              run: npm run contracts:vendor:check

            - name: Install dependencies
              run: npm ci

            - name: Compile contracts (generates TypeChain types for ESLint)
              run: npm run compile

            - name: Log retention check
              run: npm run logs:check

            - name: TypeScript typecheck
              run: npx tsc -p tsconfig.hardhat.json --noEmit

            - name: Setup kubectl
              env:
                  KUBECTL_VERSION: v1.34.2
              run: |
                  curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
                  curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
                  echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
                  sudo install -m 0755 kubectl /usr/local/bin/kubectl
                  kubectl version --client=true

            # Foundry is not installed in this job, so skip lint:forge (forge
            # fmt/lint is owned by the Solidity job). Run only the node-based
            # linters here plus Kubernetes manifest validation.
            - name: ESLint + Solhint + markdownlint
              run: npm run lint:config && npm run lint:ts && npm run lint:js && npm run lint:sol && npm run lint:md && npm run lint:cursor && npm run lint:k8s && npm run lint:logs

            - name: Prettier check
              run: npx prettier --check .

    python:
        name: Python (mypy)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install Node dependencies
              run: npm ci

            # `.python-version` pins 3.14.2. setup-python@v6 parses the comment
            # lines in that file; older releases do not, so keep this pinned to a
            # recent major. Falls back to the literal version if the file changes.
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version-file: .python-version
                  cache: pip

            # Install mypy plus the type stubs the sources need. types-reportlab
            # is pinned in utils/requirements.txt; the Azure AI Inference SDK
            # ships no stubs and is ignored in mypy.ini, so its runtime package
            # is not required just to type-check.
            - name: Install mypy and type stubs
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install mypy==2.1.0
                  python -m pip install -r utils/requirements.txt

            - name: Type-check Python sources
              run: npm run lint:py

    hardhat:
        name: Hardhat (compile + test)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Compile contracts (generates TypeChain types)
              run: npm run compile

            - name: Log retention check
              run: npm run logs:check

            - name: Run Hardhat tests
              run: npm run hardhat:test

    solidity:
        name: Solidity (forge build + test)
        runs-on: ubuntu-latest
        # foundry.toml lives in contracts/ - all `run:` steps execute from there.
        # `uses:` steps (checkout, toolchain) are unaffected by this setting.
        defaults:
            run:
                working-directory: contracts
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            # Pin to a specific release rather than `stable`. `stable` floats:
            # a newer forge added a `block-timestamp` lint that runs on build and
            # aborts on warnings, breaking CI while local toolchains lagged behind.
            # Pinning keeps CI deterministic and aligned with the local version.
            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1
              with:
                  version: v1.5.1
              env:
                  # Avoid foundryup 403 from api.github.com rate limit on shared runner IPs.
                  # foundry-toolchain has no `github-token` input; it reads GITHUB_TOKEN.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Show Forge version
              run: forge --version

            - name: Check Solidity formatting
              run: forge fmt --check

            - name: Build contracts
              run: forge build --sizes

            - name: Run tests
              run: forge test -vvv
              env:
                  FOUNDRY_PROFILE: ci

            - name: Gas snapshot diff (informational, non-blocking)
              run: forge snapshot --check || true

    rust:
        name: Rust (build + lint + test)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: 1.82.0
                  components: rustfmt, clippy

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install Node dependencies
              run: npm ci

            - name: Build Rust workspace
              run: npm run rust:build

            - name: Check Rust formatting
              run: npm run rust:fmt

            - name: Run Clippy
              run: npm run rust:clippy

            - name: Run Rust tests
              run: npm run rust:test
