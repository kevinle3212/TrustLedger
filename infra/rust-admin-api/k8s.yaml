apiVersion: apps/v1
kind: Deployment
metadata:
    name: trustledger-admin-api
    labels:
        app.kubernetes.io/name: trustledger-admin-api
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: trustledger-admin-api
    template:
        metadata:
            labels:
                app.kubernetes.io/name: trustledger-admin-api
        spec:
            securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                runAsGroup: 10001
                fsGroup: 10001
                seccompProfile:
                    type: RuntimeDefault
            containers:
                - name: admin-api
                  image: trustledger-admin-api:local
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                          drop:
                              - ALL
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                      runAsUser: 10001
                      runAsGroup: 10001
                  ports:
                      - containerPort: 4100
                  env:
                      - name: TRUSTLEDGER_ADMIN_API_BIND
                        value: 0.0.0.0:4100
                      - name: TRUSTLEDGER_ADMIN_API_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: trustledger-admin-api
                                key: token
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 4100
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 4100
---
apiVersion: v1
kind: Service
metadata:
    name: trustledger-admin-api
spec:
    selector:
        app.kubernetes.io/name: trustledger-admin-api
    ports:
        - name: http
          port: 4100
          targetPort: 4100
