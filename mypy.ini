# mypy.ini — static type-checking config for the repository's Python sources.
#
# WHAT THIS COVERS
#   The `lint:py` npm script (and the matching "Python (mypy)" CI job) run mypy
#   over the project's first-party Python:
#       - utils/generate_contract.py   (demo PDF generator; uses reportlab)
#       - scripts/models/github_models.py  (GitHub Models AI integration)
#       - scripts/analytics/generate_wallet_analytics.py (deterministic
#         scientific analytics artifacts)
#
# INTERPRETER
#   Keep `python_version` in sync with `.python-version` (3.14.2) so local, CI,
#   and the editor all type-check against the same interpreter.
#
# STRICTNESS
#   This config is intentionally maximal: `strict = True` turns on the full
#   strict bundle, and the flags below add every extra check mypy ships that
#   `strict` does not yet enable (unreachable code, strict equality, redundant
#   expressions, implicit re-exports, etc.). Treat any new error as a real
#   defect to fix rather than a check to relax.
#
# THIRD-PARTY STUBS
#   reportlab resolves via the `types-reportlab` stubs pinned in
#   utils/requirements.txt — install them first (`mypy --install-types` or
#   `pip install -r utils/requirements.txt`) or mypy reports "library stubs not
#   installed". The Azure AI Inference SDK (`azure-ai-inference` / `azure-core`)
#   ships no stubs and no `py.typed`; rather than relaxing strictness with
#   `ignore_missing_imports`, the small slice of its API we use is typed by
#   hand-written stubs under `stubs/azure/**` (see `mypy_path` below). This keeps
#   `disallow_any_unimported` honest — the SDK boundary is fully typed.

[mypy]
python_version = 3.14

# Hand-written stubs for the otherwise-untyped Azure AI Inference SDK.
mypy_path = stubs

# Full strict mode: disallow untyped/incomplete defs, untyped decorators and
# calls, implicit Optional, implicit Any, unused ignores/casts, etc.
strict = True

# Extra checks not (yet) included in `strict`.
warn_unreachable = True
strict_equality = True
strict_bytes = True
extra_checks = True
disallow_any_unimported = True
disallow_any_decorated = True
disallow_any_explicit = True
warn_no_return = True
warn_return_any = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_unused_configs = True
no_implicit_reexport = True
local_partial_types = True

# Report-only quality knobs.
show_error_codes = True
pretty = True
