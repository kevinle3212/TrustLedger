# Use the same high-capability model profile for this project unless a task asks
# for a different tradeoff.
model = "gpt-5.5"
model_reasoning_effort = "medium"

# Serena provides symbolic code navigation/editing through MCP. Keeping it
# project-scoped lets Codex inspect this repo without scanning unrelated files.
[mcp_servers.serena]
startup_timeout_sec = 15
command = "serena"
args = ["start-mcp-server", "--project-from-cwd", "--context=codex"]

# Nexus Graph mirrors the Claude setup: it serves a pre-indexed code graph for
# token-budgeted context via the project wrapper (matches `.mcp.json` and the
# `nexus:server` npm script). Refresh the graph with `npm run nexus:index` after
# large refactors.
[mcp_servers.nexus]
startup_timeout_sec = 120
command = "node"
args = ["./scripts/nexus-mcp.js", "server", "--project", "."]

# MCP env values here must be non-secret runtime hints only. Put API keys in
# `.env`, `.env.local`, Vercel env vars, or shell exports instead.
[mcp_servers.nexus.env]
NODE_ENV = "development"
NO_COLOR = "1"
NEXUS_MCP_TIMEOUT_MS = "120000"
NEXUS_MAX_TREE_SITTER_TS_BYTES = "25000"

# Hooks keep Serena active/reminding during sessions. JS REPL stays disabled to
# reduce idle tooling overhead unless a task explicitly needs it.
[features]
hooks = true
js_repl = false

# Project policy:
# - Write run notes and audit summaries to ignored `logs/`.
# - Format `logs/*.md` with `src/.agents/skills/log-markdown/SKILL.md`.
# - Use `src/.agents/agents/dependency-auditor.md` for npm audit/outdated work.
# - Request escalation for npm audit only when the user explicitly approves the
#   registry disclosure risk.
