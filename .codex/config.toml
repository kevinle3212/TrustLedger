# TrustLedger-specific Codex settings.
# Global defaults live in `~/.codex/config.toml`; keep this file limited to
# repository behavior that should not follow Codex into unrelated workspaces.

model = "gpt-5.5"
model_reasoning_effort = "medium"

# Root AGENTS.md plus Codex-specific guidance can exceed the default 32 KiB
# project-doc budget. Keep the project layer intact so routing and quality
# gates are visible at session start.
project_doc_max_bytes = 65536

[features]
hooks = true

# Serena provides symbolic code navigation/editing. Project-scoped so Codex
# inspects this repo without scanning unrelated files. NO_COLOR keeps ANSI codes
# out of the stdio JSON-RPC stream.
[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--project-from-cwd", "--context=codex"]
startup_timeout_sec = 15

[mcp_servers.serena.env]
NO_COLOR = "1"

# Nexus serves the repository-specific source graph. It complements Graphify:
# use Nexus for MCP context retrieval and Graphify CLI/skill for graph queries,
# audits, and incremental graph updates.
[mcp_servers.nexus]
command = "node"
args = ["./scripts/nexus-mcp.js", "server", "--project", "."]
startup_timeout_sec = 120

[mcp_servers.nexus.env]
NODE_ENV = "development"
NO_COLOR = "1"
NEXUS_MCP_TIMEOUT_MS = "120000"
NEXUS_MAX_TREE_SITTER_TS_BYTES = "25000"
